name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ─────────────────────────────────────────
  # JOB 1 — Lint
  # Checks code style and formatting.
  # Fails fast — no point running tests on broken code.
  # ─────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: todo-api
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linter
        run: pip install ruff

      - name: Run ruff
        run: ruff check app/

  # ─────────────────────────────────────────
  # JOB 2 — Test
  # Runs pytest with coverage.
  # Uses SQLite in-memory — no real DB needed.
  # Posts coverage summary to the job output.
  # ─────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: todo-api
    needs: lint  # only runs if lint passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          # Cache key includes the hash of requirements.txt.
          # If requirements.txt changes, the cache is invalidated automatically.
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt pytest-cov

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-fail-under=70

  # ─────────────────────────────────────────
  # JOB 3 — Build
  # Builds the Docker image to verify the
  # Dockerfile is valid. Does NOT push yet —
  # pushing is the CD pipeline's job.
  # ─────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: todo-api
    needs: test  # only runs if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: todo-api
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: todo-api:${{ github.sha }}